<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form name="ai-readiness-scan-request" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="ai-readiness-scan-request" />
      <input name="bot-field" />
      <input name="website_url" />
      <input name="contact_name" />
      <input name="email" />
      <input name="company" />
      <input name="instant_result" />
      <input name="submitted_from" />
      <input name="referrer" />
      <input name="utm_source" />
      <input name="utm_medium" />
      <input name="utm_campaign" />
      <input name="utm_term" />
      <input name="utm_content" />
      <input name="gclid" />
      <input name="fbclid" />
      <input name="msclkid" />
    </form>
  </body>
</html>
